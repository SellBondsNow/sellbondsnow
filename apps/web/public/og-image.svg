<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#0a0a0a"/>

  <!-- subtle grid texture -->
  <g opacity="0.06" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/>
  </g>

  <!-- $ mark in rounded square (top-left) -->
  <g transform="translate(96, 96)">
    <rect width="128" height="128" rx="20" fill="#ffffff"/>
    <text x="64" y="86"
          font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace"
          font-size="80"
          font-weight="700"
          text-anchor="middle"
          fill="#0a0a0a">$</text>
  </g>

  <!-- wordmark next to icon -->
  <text x="252" y="184"
        font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace"
        font-size="36"
        font-weight="600"
        fill="#ffffff"
        letter-spacing="-1">sellbonds.now</text>

  <!-- main headline -->
  <text x="96" y="296"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="76"
        font-weight="700"
        fill="#ffffff"
        letter-spacing="-2.5">Have your AI agent</text>
  <text x="96" y="380"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="76"
        font-weight="700"
        fill="#ffffff"
        letter-spacing="-2.5">raise money for you</text>
  <text x="96" y="464"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="76"
        font-weight="700"
        fill="#ffffff"
        letter-spacing="-2.5">by selling bonds</text>

  <!-- subtitle -->
  <text x="96" y="552"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="26"
        font-weight="400"
        fill="#a3a3a3"
        letter-spacing="-0.5">Issue, sell, and repay on-chain bonds from any AI agent.</text>
</svg>
